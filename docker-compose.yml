services:
  chroma:
    image: chromadb/chroma:latest
    container_name: mcp-variable-chroma
    restart: unless-stopped
    ports:
      - "${MCP_VARIABLE_CHROMA_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v2/heartbeat', timeout=3)\" || python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat', timeout=3)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  mcp-variable-sse:
    build:
      context: .
      target: runtime
    image: mcp-variable-sse:latest
    container_name: mcp-variable-sse
    restart: unless-stopped
    depends_on:
      chroma:
        condition: service_healthy
    ports:
      - "${MCP_VARIABLE_PORT:-3000}:${MCP_VARIABLE_PORT:-3000}"
    environment:
      MCP_VARIABLE_HOST: 0.0.0.0
      MCP_VARIABLE_PORT: "${MCP_VARIABLE_PORT:-3000}"
      MCP_VARIABLE_CSV: /app/data/terms.csv
      MCP_VARIABLE_SSE_PATH: "${MCP_VARIABLE_SSE_PATH:-/sse}"
      MCP_VARIABLE_MESSAGES_PATH: "${MCP_VARIABLE_MESSAGES_PATH:-/messages}"
      MCP_VARIABLE_API_KEYS: "${MCP_VARIABLE_API_KEYS:-}"
      MCP_VARIABLE_ALLOWED_ORIGINS: "${MCP_VARIABLE_ALLOWED_ORIGINS:-}"
      MCP_VARIABLE_MAX_SESSIONS: "${MCP_VARIABLE_MAX_SESSIONS:-100}"
      MCP_VARIABLE_RATE_LIMIT_WINDOW_MS: "${MCP_VARIABLE_RATE_LIMIT_WINDOW_MS:-60000}"
      MCP_VARIABLE_RATE_LIMIT_MAX: "${MCP_VARIABLE_RATE_LIMIT_MAX:-120}"
      MCP_VARIABLE_CHROMA_HOST: chroma
      MCP_VARIABLE_CHROMA_PORT: "8000"
      MCP_VARIABLE_CHROMA_COLLECTION: "${MCP_VARIABLE_CHROMA_COLLECTION:-mcp_variable_terms}"
      MCP_VARIABLE_CHROMA_SYNC_ON_START: "${MCP_VARIABLE_CHROMA_SYNC_ON_START:-true}"
      MCP_VARIABLE_CHROMA_STARTUP_TIMEOUT_MS: "${MCP_VARIABLE_CHROMA_STARTUP_TIMEOUT_MS:-60000}"
    volumes:
      - "${MCP_VARIABLE_CSV_SOURCE:-./data/terms.csv}:/app/data/terms.csv:ro"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const port = process.env.MCP_VARIABLE_PORT || '3000'; fetch('http://127.0.0.1:' + port + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1));\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  chroma-data:
